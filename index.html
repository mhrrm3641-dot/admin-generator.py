<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Özel Sohbet Girişi</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1e1e1e; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .buy-link { display: block; margin-top: 20px; color: #aaa; text-decoration: none; font-size: 13px; }
        .buy-link:hover { color: #007bff; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Sohbete Giriş</h2>
        <input type="text" placeholder="Kullanıcı Adı">
        <input type="password" placeholder="Şifre">
        <input type="text" placeholder="Aktivasyon Kodu">
        <button>Hesabı Aktifleştir ve Gir</button>
        <a href="BURAYA_SATIS_LİNKİ_GELECEK" class="buy-link">Henüz kodun yok mu? Buradan satın al.</a>
    </div>
</body>
</html>
